<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heating Design Desk</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#16232E">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HeatDesk">
<meta name="mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --paper: #EAEEF0;
  --paper-raised: #F5F7F8;
  --ink: #16232E;
  --ink-2: #1F313F;
  --copper: #B5652E;
  --copper-dark: #8F4E23;
  --brass: #D8B26B;
  --graphite: #23282C;
  --muted: #6B747A;
  --line: #C9D1D6;
  --ok: #3F7D58;
  --ok-bg: #E1EEE5;
  --danger: #B23B33;
  --danger-bg: #F5DEDC;
  --font-ui: 'Space Grotesk', sans-serif;
  --font-mono: 'IBM Plex Mono', monospace;
}
* { box-sizing: border-box; }
body { margin: 0; font-family: var(--font-ui); background: var(--paper); color: var(--graphite); }
.app { display: flex; min-height: 100vh; }

/* ===== SIDEBAR ===== */
.sidebar { width: 240px; flex-shrink: 0; background: var(--ink); color: #D7DEE3; display: flex; flex-direction: column; }
.brand { padding: 26px 22px 18px; border-bottom: 1px solid #2A3B48; }
.brand-mark { font-family: var(--font-mono); font-size: 11px; letter-spacing: 2px; color: var(--brass); text-transform: uppercase; }
.brand-title { font-size: 19px; font-weight: 600; margin-top: 6px; line-height: 1.25; color: #fff; }
.nav { flex: 1; padding: 14px 10px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 11px 12px; border-radius: 6px; cursor: pointer; font-size: 14px; color: #AEB9C2; margin-bottom: 2px; border-left: 3px solid transparent; }
.nav-item:hover { background: #1D2C38; color: #fff; }
.nav-item.active { background: #223343; color: #fff; border-left: 3px solid var(--copper); }
.nav-num { font-family: var(--font-mono); font-size: 11px; color: var(--brass); width: 16px; }
.sidebar-foot { padding: 16px 22px; border-top: 1px solid #2A3B48; font-size: 11px; color: #6E7C87; line-height: 1.6; }

/* ===== MAIN ===== */
.main { flex: 1; padding: 34px 40px 80px; max-width: 1180px; }
.panel { display: none; }
.panel.active { display: block; }
.panel-head { margin-bottom: 26px; }
.panel-eyebrow { font-family: var(--font-mono); font-size: 11px; letter-spacing: 1.5px; color: var(--copper); text-transform: uppercase; }
.panel-title { font-size: 26px; font-weight: 600; margin: 4px 0 8px; }
.panel-sub { color: var(--muted); font-size: 14px; max-width: 640px; line-height: 1.55; }

.card { background: var(--paper-raised); border: 1px solid var(--line); border-radius: 10px; padding: 22px 24px; margin-bottom: 18px; }
.card-title { font-size: 15px; font-weight: 600; margin: 0 0 14px; display: flex; align-items: center; justify-content: space-between; }
.card-title small { font-family: var(--font-mono); font-weight: 400; font-size: 11px; color: var(--muted); }

.grid { display: grid; gap: 14px; }
.g2 { grid-template-columns: 1fr 1fr; }
.g3 { grid-template-columns: 1fr 1fr 1fr; }
.g4 { grid-template-columns: repeat(4, 1fr); }

label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; font-weight: 500; }
input, select { width: 100%; padding: 9px 11px; border: 1px solid var(--line); border-radius: 6px; background: #fff; font-family: var(--font-mono); font-size: 13.5px; color: var(--graphite); }
input:focus, select:focus { outline: 2px solid var(--copper); outline-offset: 1px; border-color: var(--copper); }
.field { margin-bottom: 4px; }

.btn { font-family: var(--font-ui); font-size: 13px; font-weight: 600; padding: 9px 16px; border-radius: 6px; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 7px; }
.btn-primary { background: var(--copper); color: #fff; }
.btn-primary:hover { background: var(--copper-dark); }
.btn-ghost { background: transparent; color: var(--ink); border: 1px solid var(--line); }
.btn-ghost:hover { border-color: var(--copper); color: var(--copper); }
.btn-danger-ghost { background: transparent; color: var(--danger); border: 1px solid var(--danger-bg); font-size: 12px; padding: 5px 10px; }
.btn-row { display: flex; gap: 10px; margin-top: 4px; }

table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); font-weight: 600; padding: 8px 10px; border-bottom: 1px solid var(--line); }
td { padding: 9px 10px; border-bottom: 1px solid #E4E8EA; font-family: var(--font-mono); }
td.name-cell { font-family: var(--font-ui); }
tr:last-child td { border-bottom: none; }
.numcell { text-align: right; }

.badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; font-family: var(--font-mono); }
.badge-ok { background: var(--ok-bg); color: var(--ok); }
.badge-danger { background: var(--danger-bg); color: var(--danger); }
.badge-neutral { background: #E9EDEF; color: var(--muted); }

.result-strip { display: flex; gap: 22px; flex-wrap: wrap; margin-top: 6px; }
.result-item { min-width: 140px; }
.result-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
.result-value { font-family: var(--font-mono); font-size: 20px; font-weight: 600; color: var(--ink); }
.result-value.copper { color: var(--copper-dark); }
.result-unit { font-size: 12px; color: var(--muted); font-weight: 400; margin-left: 3px; }

.note { font-size: 12.5px; color: var(--muted); line-height: 1.55; margin-top: 8px; }
.note.warn { color: var(--copper-dark); background: #FAF0E4; border-left: 3px solid var(--copper); padding: 9px 12px; border-radius: 4px; }

.empty { text-align: center; padding: 30px 20px; color: var(--muted); font-size: 13px; }
.empty-title { font-weight: 600; color: var(--graphite); margin-bottom: 4px; }

/* velocity gauge */
.gauge-wrap { display: flex; align-items: center; gap: 24px; }
.gauge-readout { font-family: var(--font-mono); }
.gauge-readout .big { font-size: 30px; font-weight: 600; color: var(--ink); }
.gauge-readout .lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

.toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.chip-row { display: flex; gap: 8px; flex-wrap: wrap; }
.chip { font-family: var(--font-mono); font-size: 11px; padding: 4px 10px; border-radius: 20px; background: #E9EDEF; color: var(--muted); }

@media (max-width: 880px) {
  .app { flex-direction: column; }
  .sidebar { width: 100%; }
  .nav { display: flex; overflow-x: auto; padding: 8px; }
  .nav-item { flex-shrink: 0; }
  .g2, .g3, .g4 { grid-template-columns: 1fr; }
  .main { padding: 20px; }
}
</style>
</head>
<body>
<div class="app">

  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">Volume Heating Design</div>
      <div class="brand-title">Heating Design Desk</div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="sidebar-foot">Formulas validated against CIBSE Domestic Heating Design Guide, Sections 4 &amp; 5. All figures are calculated live in this page — nothing is sent anywhere.</div>
  </aside>

  <main class="main" id="main"></main>

</div>

<input type="file" id="importInput" accept="application/json" style="display:none">

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js').catch(() => {
      console.log('Service worker registration skipped — likely running from a file:// URL. Host on HTTPS for full offline/install support.');
    });
  });
}
</script>

<script src="app.js"></script>
</body>
</html>
